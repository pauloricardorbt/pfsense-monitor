@version: 3.38
@include "scl.conf"

# ── Fonte: logs do pfSense via UDP/TCP ────────────────────────────────────────
source s_pfsense {
    udp(ip(0.0.0.0) port(514) flags(no-multi-line));
    tcp(ip(0.0.0.0) port(601) flags(no-multi-line));
};

# ── Filtros por tipo de evento ────────────────────────────────────────────────

# Gateway caiu ou voltou (dpinger é o daemon de monitoramento de gateway)
filter f_gateway_alarm {
    program("dpinger") and (
        message("Alarm latency") or
        message("Alarm loss") or
        message("Alarm cleared") or
        message("Loss 100%")
    );
};

# ── SEGURANÇA: Tentativas de invasão ─────────────────────────────────────────

# Falha de login SSH (brute force, usuário inválido, senha errada)
filter f_ssh_attack {
    program("sshd") and (
        message("Failed password") or
        message("Invalid user") or
        message("authentication failure") or
        message("Connection closed by invalid user") or
        message("Did not receive identification string") or
        message("Bad protocol version identification") or
        message("Unable to negotiate") or
        message("no matching key exchange method")
    );
};

# Login SSH bem-sucedido (monitorar quem entrou)
filter f_ssh_success {
    program("sshd") and (
        message("Accepted password") or
        message("Accepted publickey")
    );
};

# Tentativa de acesso ao painel Web (pfSense GUI)
filter f_webgui_attack {
    program("php") and (
        message("webConfigurator authentication error") or
        message("GUI login failed") or
        message("authentication error for user")
    );
};

# Login bem-sucedido no painel Web
filter f_webgui_success {
    program("php") and (
        message("Successful login") or
        message("logged in successfully")
    );
};

# IP banido automaticamente pelo Login Protection do pfSense
filter f_ip_banned {
    program("php") and (
        message("has been banned") or
        message("blocked by login protection") or
        message("Too many failed login attempts")
    );
};

# Port scan ou varredura detectada pelo pfSense/firewall
filter f_portscan {
    program("filterlog") and (
        message("block") or
        message("drop")
    ) and (
        message(":22:") or
        message(":23:") or
        message(":3389:") or
        message(":445:") or
        message(":1433:") or
        message(":3306:")
    );
};

# Alertas do Snort IDS/IPS (qualquer alerta é importante)
filter f_snort {
    program("snort");
};

# Filtro combinado: todos os eventos de segurança/invasão
filter f_security {
    filter(f_ssh_attack) or
    filter(f_ssh_success) or
    filter(f_webgui_attack) or
    filter(f_webgui_success) or
    filter(f_ip_banned) or
    filter(f_portscan) or
    filter(f_snort);
};

# ── Outros filtros de sistema ─────────────────────────────────────────────────

# Eventos críticos e de emergência (nível syslog)
filter f_critical {
    level(err..emerg);
};

# Mudança de configuração no pfSense
filter f_config_change {
    message("config.xml") or
    (program("php") and message("configuration changed"));
};

# Filtro combinado: qualquer evento que merece alerta
filter f_pfsense_alert {
    filter(f_gateway_alarm) or
    filter(f_security) or
    filter(f_critical) or
    filter(f_config_change);
};

# ── Destinos ──────────────────────────────────────────────────────────────────

# Envia para n8n via webhook HTTP (POST JSON)
destination d_n8n {
    http(
        url("http://10.1.2.253:5678/webhook/pfsense-syslog")
        method("POST")
        body('{"host":"${HOST}","program":"${PROGRAM}","pid":"${PID}","message":"${MESSAGE}","priority":"${PRI}","facility":"${FACILITY}","level":"${LEVEL}","date":"${ISODATE}"}')
        headers("Content-Type: application/json")
        timeout(10)
        retries(3)
    );
};

# Salva todos os logs do pfSense em arquivo (histórico completo)
destination d_file_all {
    file("/var/log/pfsense/pfsense-all.log"
        template("${ISODATE} ${HOST} ${PROGRAM}[${PID}]: ${MESSAGE}\n")
        owner("root") group("root") perm(0640)
        create-dirs(yes)
    );
};

# Salva apenas os eventos de alerta em arquivo separado
destination d_file_alerts {
    file("/var/log/pfsense/pfsense-alerts.log"
        template("${ISODATE} ${HOST} ${PROGRAM}[${PID}]: ${MESSAGE}\n")
        owner("root") group("root") perm(0640)
        create-dirs(yes)
    );
};

# ── Regras de log ─────────────────────────────────────────────────────────────

# Todos os logs do pfSense → arquivo completo
log {
    source(s_pfsense);
    destination(d_file_all);
};

# Eventos críticos → n8n + arquivo de alertas
log {
    source(s_pfsense);
    filter(f_pfsense_alert);
    destination(d_n8n);
    destination(d_file_alerts);
};
