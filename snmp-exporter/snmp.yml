# Módulo SNMP para pfSense 2.7.x
# Community: public | Versão: SNMPv2c
auths:
  public_v2:
    community: public
    security_level: noAuthNoPriv
    version: 2

modules:
  pfsense:
    walk:
      - 1.3.6.1.2.1.1.3       # sysUpTime
      - 1.3.6.1.2.1.2.2       # ifTable (interfaces)
      - 1.3.6.1.2.1.31.1.1    # ifXTable (contadores 64-bit)
      - 1.3.6.1.4.1.2021.4    # UCD-SNMP: memória
      - 1.3.6.1.4.1.2021.11   # UCD-SNMP: CPU
      - 1.3.6.1.2.1.25.2.3    # hrStorageTable (disco/memória)
      - 1.3.6.1.2.1.25.3.3    # hrProcessorLoad (% CPU por core)
    metrics:

      # ── Uptime ────────────────────────────────────────────────────────────
      - name: sysUpTime
        oid: 1.3.6.1.2.1.1.3.0
        type: gauge
        help: Uptime do sistema em centésimos de segundo

      # ── Status das interfaces ─────────────────────────────────────────────
      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: Status operacional da interface (1=up, 2=down, 3=testing)
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifAdminStatus
        oid: 1.3.6.1.2.1.2.2.1.7
        type: gauge
        help: Status administrativo da interface (1=up, 2=down)
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      # ── Tráfego de rede ───────────────────────────────────────────────────
      - name: ifInOctets
        oid: 1.3.6.1.2.1.2.2.1.10
        type: counter
        help: Bytes recebidos pela interface
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifOutOctets
        oid: 1.3.6.1.2.1.2.2.1.16
        type: counter
        help: Bytes enviados pela interface
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifInErrors
        oid: 1.3.6.1.2.1.2.2.1.14
        type: counter
        help: Erros de recepção na interface
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifOutErrors
        oid: 1.3.6.1.2.1.2.2.1.20
        type: counter
        help: Erros de envio na interface
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      # ── CPU (UCD-SNMP-MIB) ────────────────────────────────────────────────
      - name: ssCpuUser
        oid: 1.3.6.1.4.1.2021.11.9.0
        type: gauge
        help: Percentual de CPU em modo usuário

      - name: ssCpuSystem
        oid: 1.3.6.1.4.1.2021.11.10.0
        type: gauge
        help: Percentual de CPU em modo kernel/sistema

      - name: ssCpuIdle
        oid: 1.3.6.1.4.1.2021.11.11.0
        type: gauge
        help: Percentual de CPU ociosa

      # ── Memória (UCD-SNMP-MIB) ────────────────────────────────────────────
      - name: memTotalReal
        oid: 1.3.6.1.4.1.2021.4.5.0
        type: gauge
        help: Memória física total em KB

      - name: memAvailReal
        oid: 1.3.6.1.4.1.2021.4.6.0
        type: gauge
        help: Memória física disponível em KB

      - name: memTotalSwap
        oid: 1.3.6.1.4.1.2021.4.3.0
        type: gauge
        help: Swap total em KB

      - name: memAvailSwap
        oid: 1.3.6.1.4.1.2021.4.4.0
        type: gauge
        help: Swap disponível em KB

      # ── Carga de CPU por core (HOST-RESOURCES-MIB) ────────────────────────
      - name: hrProcessorLoad
        oid: 1.3.6.1.2.1.25.3.3.1.2
        type: gauge
        help: Percentual de utilização por processador
        indexes:
          - labelname: hrDeviceIndex
            type: gauge
